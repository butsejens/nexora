name: Release Server

on:
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string
      route:
        required: true
        type: string

permissions:
  contents: write

jobs:
  server:
    name: Deploy Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release env
        run: node scripts/release/validate-release-env.mjs release server

      - name: Server sanity checks
        run: |
          node --check server/index.js
          node --check server/update-manifest.js

      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL" >/tmp/render-deploy-response.txt
          echo "Render deploy hook triggered"

      - name: Update release metadata
        run: |
          VERSION=$(node -e "console.log(require('./server/package.json').version)")
          node scripts/release/update-release-metadata.mjs server "$VERSION" "${{ github.sha }}" "${{ inputs.route }}"

      - name: Commit metadata update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/update-manifest.json server/release-report.json server/app-version.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): server metadata refresh [skip ci]"
            git push origin HEAD:main
          fi
