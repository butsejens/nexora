name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # required to create/update GitHub Releases

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle dependencies & build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache NDK 27.1.12297006
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/27.1.12297006
          key: ndk-27.1.12297006-${{ runner.os }}

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>&1 \
            | grep -v "^\[=" || true

      - name: Install NDK 27.1.12297006
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.1.12297006" \
            || echo "::warning::sdkmanager NDK install returned non-zero; Gradle will attempt auto-download"

      - name: Write android/local.properties (CI SDK path)
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Root npm ci installs ALL workspace packages (app + server) via npm workspaces.
      # A separate install for app/ is NOT needed.
      - name: Install npm dependencies
        run: npm ci

      - name: Build Android APK (release)
        env:
          NODE_ENV: production
          EXPO_METRO_NO_CACHE: '1'
          # GRADLE_OPTS sets JVM args for the Gradle process itself.
          # With --no-daemon, org.gradle.jvmargs in gradle.properties does NOT apply.
          # These -X flags must be set here directly so --no-daemon builds get enough memory.
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError'
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}
          EXPO_PUBLIC_API_BASE: ${{ secrets.EXPO_PUBLIC_API_BASE }}
          EXPO_PUBLIC_API_BASES: ${{ secrets.EXPO_PUBLIC_API_BASES }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --build-cache \
            --parallel \
            2>&1

      - name: Verify APK exists
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found at expected path: $APK"
            echo "Searching for any APK output..."
            find android/app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "SUCCESS: APK found"
          ls -lh "$APK"

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./app/app.json').expo.version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Rename APK with version
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/nexora-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexora-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/nexora-v${{ steps.version.outputs.version }}.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create or update GitHub Draft Release with APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK="android/app/build/outputs/apk/release/nexora-v${VERSION}.apk"

          echo "Publishing draft release v${VERSION} with APK: $APK"

          # Remove existing release + tag if present (handles re-runs for the same version)
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

          # Create the draft release first.
          gh release create "v${VERSION}" \
            --title "Nexora v${VERSION}" \
            --notes "Android APK — commit ${{ github.sha }} (branch: ${{ github.ref_name }})" \
            --draft \
            --repo "${{ github.repository }}"

          # Upload APK as an explicit asset (clobber handles reruns safely).
          gh release upload "v${VERSION}" \
            "$APK" \
            --clobber \
            --repo "${{ github.repository }}"

          # Fail fast if APK asset is missing from the release.
          gh release view "v${VERSION}" --json assets --jq '.assets[].name' --repo "${{ github.repository }}" | grep -Fx "nexora-v${VERSION}.apk" >/dev/null

          echo "Release published: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
