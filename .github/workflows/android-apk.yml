name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required to create/update GitHub Releases

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Both names are used by different Android tooling versions
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>&1 \
            | grep -v "^\[=" || true

      - name: Install NDK 27.1.12297006
        run: |
          NDK_VERSION="27.1.12297006"
          NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ -d "$NDK_PATH" ]; then
            echo "NDK $NDK_VERSION already installed at $NDK_PATH"
          else
            echo "Installing NDK $NDK_VERSION via sdkmanager..."
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION" \
              || echo "::warning::sdkmanager NDK install returned non-zero; Gradle will attempt auto-download"
          fi
          ls "$ANDROID_HOME/ndk/" 2>/dev/null || echo "No NDK directory found"

      - name: Write android/local.properties (CI SDK path)
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Root npm ci installs ALL workspace packages (app + server) via npm workspaces.
      # A separate install for app/ is NOT needed.
      - name: Install npm dependencies
        run: npm ci

      - name: Build Android APK (release)
        env:
          NODE_ENV: production
          EXPO_METRO_NO_CACHE: '1'
          # GRADLE_OPTS sets JVM args for the Gradle process itself.
          # With --no-daemon, org.gradle.jvmargs in gradle.properties does NOT apply.
          # These -X flags must be set here directly so --no-daemon builds get enough memory.
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError'
          EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}
          EXPO_PUBLIC_API_BASE: ${{ secrets.EXPO_PUBLIC_API_BASE }}
          EXPO_PUBLIC_API_BASES: ${{ secrets.EXPO_PUBLIC_API_BASES }}
        run: |
          cd android
          ./gradlew clean assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --no-daemon \
            --stacktrace \
            2>&1

      - name: Verify APK exists
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found at expected path: $APK"
            echo "Searching for any APK output..."
            find android/app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "SUCCESS: APK found"
          ls -lh "$APK"

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./app/app.json').expo.version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Rename APK with version
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/nexora-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexora-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/nexora-v${{ steps.version.outputs.version }}.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create or update GitHub Release with APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK="android/app/build/outputs/apk/release/nexora-v${VERSION}.apk"

          echo "Publishing release v${VERSION} with APK: $APK"

          # Remove existing release + tag if present (handles re-runs for the same version)
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

          # Create the release and attach the APK
          gh release create "v${VERSION}" \
            "$APK" \
            --title "Nexora v${VERSION}" \
            --notes "Android APK — commit ${{ github.sha }} (branch: ${{ github.ref_name }})" \
            --latest \
            --repo "${{ github.repository }}"

          echo "Release published: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
