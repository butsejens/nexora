name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Root npm ci installs all workspaces (app + server) in one shot.
      # A separate install in app/ is NOT needed with npm workspaces.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint (app)
        run: npx expo lint --no-cache
        working-directory: app

      - name: Type check (app)
        run: npx tsc --noEmit
        working-directory: app

      - name: Routing logic tests
        run: npm run deploy:test-routing

      - name: Server syntax sanity
        run: node --check server/index.js
