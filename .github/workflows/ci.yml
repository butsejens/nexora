name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install app dependencies
        run: npm ci --ignore-scripts
        working-directory: app

      - name: Lint (app)
        run: npx expo lint
        working-directory: app

      - name: Type check (app)
        run: npx tsc --noEmit
        working-directory: app
