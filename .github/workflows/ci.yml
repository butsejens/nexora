name: CI Validation

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate App + Server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Env sanity
        run: npm run ci:env-sanity

      - name: Config validation
        run: npm run ci:config-validate

      - name: Lint
        run: npm run ci:lint

      - name: Type check
        run: npm run ci:typecheck

      - name: Tests
        run: npm run ci:test

      - name: Build sanity
        run: npm run ci:build-sanity
