name: Release OTA

on:
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string
      route:
        required: true
        type: string

permissions:
  contents: write

jobs:
  ota:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE: ${{ secrets.EXPO_PUBLIC_API_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release env
        run: node scripts/release/validate-release-env.mjs release ota

      - name: Publish OTA to production channel
        working-directory: app
        run: |
          npx eas-cli update \
            --branch production \
            --message "ota:${{ github.sha }}"

      - name: Update release metadata
        run: |
          VERSION=$(node -e "console.log(require('./app/app.json').expo.version)")
          node scripts/release/update-release-metadata.mjs ota "$VERSION" "${{ github.sha }}" "${{ inputs.route }}"

      - name: Commit metadata update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/update-manifest.json server/release-report.json server/app-version.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): OTA metadata refresh [skip ci]"
            git push origin HEAD:main
          fi
