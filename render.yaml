services:
  - type: web
    name: nexora-api
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_TZ
        value: Europe/Brussels
      - key: PORT
        value: 8080
      - key: ZILLIZ_URI
        sync: false
      - key: ZILLIZ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: SPORTSRC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: APIFY_SOFASCORE_ACTOR
        value: azzouzana/sofascore-scraper-pro
      - key: APIFY_TRANSFERMARKT_ACTOR
        value: data_xplorer/transfermarkt-api-scraper
